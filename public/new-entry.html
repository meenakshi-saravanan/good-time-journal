<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapters Journal</title>
    <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg">
  <link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
   <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

    <header class="app-header">

  <div class="container-fluid px-4">

    <div class="d-flex align-items-center justify-content-between">

      <!-- Left -->
      <div class="d-flex align-items-center gap-3">

        <img
          src="../assets/images/Header-Logo.svg"
          alt="Chapters"
          class="header-logo"
        >

      </div>

      <!-- Right -->
      <div class="d-flex align-items-center gap-3">
 <button
        type="button"
        id="logoutButton"
        class="btn btn-sm"
      >
        Logout
      </button>
       
        <div class="user-avatar">
          MS
        </div>

      </div>

    </div>

  </div>

</header>

<main class="container py-4">
    <div
      class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3 mb-3"
    >
      <a
        type="button"
        id="backButton"
        class="link-offset-2 link-underline link-underline-opacity-0"
      >
        <i class="bi bi-arrow-left"></i>
        Recent Entries
      </a>

    </div>

    <h1 id="entryFormTitle" class="h2 mb-0">New Journal Entry</h1>


  <div
    id="entryLoading"
    class="text-secondary py-4"
  >
    Loading journal...
  </div>

  <form id="entryForm" class="d-none">

    <div id="standardEntryFields" class="d-none">
      <div class="mb-3 mt-4">
        <label for="title" class="form-label">Title</label>
        <input
          type="text"
          id="title"
          class="form-control"
          placeholder="A thought worth keeping"
        >
      </div>

    </div>

    <div id="goodTimeEntryFields" class="d-none">
    <div class="mb-3">
      <label for="entry_date" class="form-label">Date</label>
      <input
        type="date"
        id="entry_date"
        class="form-control"
        required
      >
    </div>

    <div class="mb-3">
      <label for="activity" class="form-label">Activity</label>
      <input
        type="text"
        id="activity"
        class="form-control"
        placeholder="Cycling"
        required
      >
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="energy" class="form-label">Energy (1-5)</label>
        <input
          type="number"
          id="energy"
          class="form-control"
          min="1"
          max="5"
          required
        >
      </div>

      <div class="col-md-6 mb-3">
        <label for="engagement" class="form-label">Engagement (1-5)</label>
        <input
          type="number"
          id="engagement"
          class="form-control"
          min="1"
          max="5"
          required
        >
      </div>
    </div>

    </div>

    <div class="mb-4">
     

      <div
        class="editor-toolbar gap-2 mb-2"
        role="toolbar"
        aria-label="Journal notes formatting">
         <button
    type="button"
    id="undoButton"
    class="editor-toolbar-button"
    title="Undo"
  >
    <i class="bi bi-arrow-counterclockwise"></i>
  </button>

  <button
    type="button"
    id="redoButton"
    class="editor-toolbar-button"
    title="Redo"
  >
    <i class="bi bi-arrow-clockwise"></i>
  </button>
  <div class="editor-toolbar-divider"></div>
        <div class="dropdown">

  <button
    id="headingDropdown"
    class="editor-heading-dropdown"
    type="button"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    <span id="headingLabel">
      H2
    </span>

    <i class="bi bi-chevron-down"></i>
  </button>

  <ul class="dropdown-menu editor-dropdown-menu">
    <li>
      <button
        type="button"
        class="dropdown-item"
        data-heading="paragraph"
      >
        Paragraph
      </button>
    </li>

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-heading="1"
      >
        H1
      </button>
    </li>

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-heading="2"
      >
        H2
      </button>
    </li>

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-heading="3"
      >
        H3
      </button>
    </li>

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-heading="4"
      >
        H4
      </button>
    </li>
  </ul>

</div>

<div class="dropdown">

  <button
    id="listDropdown"
    class="editor-toolbar-pill"
    type="button"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    <i class="bi bi-list-ul"></i>
    <i class="bi bi-chevron-down"></i>
  </button>

  <ul class="dropdown-menu editor-dropdown-menu">

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-list="bullet"
      >
        <i class="bi bi-list-ul me-2"></i>
        Bullet List
      </button>
    </li>

    <li>
      <button
        type="button"
        class="dropdown-item"
        data-list="ordered"
      >
        <i class="bi bi-list-ol me-2"></i>
        Ordered List
      </button>
    </li>

  </ul>

</div>
<div class="editor-toolbar-divider"></div>

        <div class="editor-toolbar-group btn-group-sm" role="group">
          <button
  type="button"
  id="boldButton"
  class="editor-icon-button"
>
  <i class="bi bi-type-bold"></i>
</button>

<button
  type="button"
  id="italicButton"
  class="editor-icon-button"
>
  <i class="bi bi-type-italic"></i>
</button>

<button
  type="button"
  id="strikeButton"
  class="editor-icon-button"
>
  <i class="bi bi-type-strikethrough"></i>
</button>

<button
  type="button"
  id="underlineButton"
  class="editor-icon-button"
>
  <i class="bi bi-type-underline"></i>
</button>

<button
  type="button"
  id="highlightButton"
  class="editor-icon-button"
>
  <i class="bi bi-highlighter"></i>
</button>
<button
  type="button"
  id="linkButton"
  class="editor-icon-button"
>
  <i class="bi bi-link-45deg"></i>
</button>
<button
  type="button"
  id="insertImageButton"
  class="editor-icon-button"
  title="Insert image"
>
  <i class="bi bi-image"></i>
</button>
<input
  type="file"
  id="imageUploadInput"
  class="d-none"
  accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
>
<div class="editor-toolbar-divider"></div>

<button
  type="button"
  id="alignLeftButton"
  class="editor-icon-button"
>
  <i class="bi bi-text-left"></i>
</button>

<button
  type="button"
  id="alignCenterButton"
  class="editor-icon-button"
>
  <i class="bi bi-text-center"></i>
</button>

<button
  type="button"
  id="alignRightButton"
  class="editor-icon-button"
>
  <i class="bi bi-text-right"></i>
</button>

<button
  type="button"
  id="alignJustifyButton"
  class="editor-icon-button"
>
  <i class="bi bi-justify"></i>
</button>
         
        </div>

        <div class="editor-toolbar-group btn-group-sm" role="group">
          
       
        </div>
      </div>
      <div
  id="linkPopover"
  class="editor-link-popover d-none"
>

  <input
    type="text"
    id="linkInput"
    class="editor-link-input"
    placeholder="Paste a link..."
  >

  <div
    class="editor-link-actions"
  >

    <button
      type="button"
      id="applyLinkButton"
    >
      <i class="bi bi-arrow-return-left"></i>
    </button>

    <button
      type="button"
      id="openLinkButton"
    >
      <i class="bi bi-box-arrow-up-right"></i>
    </button>

    <button
      type="button"
      id="removeLinkButton"
    >
      <i class="bi bi-trash"></i>
    </button>

  </div>

</div>

      <div
        id="editor"
        class="tiptap-editor"
      ></div>

      <input
        type="hidden"
        id="notes"
      >
    </div>

    <button type="submit" class="btn btn-primary">
      Save Entry
    </button>

  </form>

</main>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>
<script src="js/api.js"></script>
<script type="module" src="js/editor.js"></script>
<script src="js/app.js"></script>

</body>
</html>
