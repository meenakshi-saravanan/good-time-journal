<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapters Journal</title>
    <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
   <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

<main class="container py-4">

  <header class="mb-4">
    <div
      class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3 mb-3"
    >
      <a
        type="button"
        id="backButton"
        class="link-offset-2 link-underline link-underline-opacity-0"
      >
        <i class="bi bi-arrow-left"></i>
        Recent Entries
      </a>

      <div class="d-flex align-items-center gap-3">
        <span id="userName" class="text-secondary"></span>
        <button
          type="button"
          id="logoutButton"
          class="btn btn-outline-secondary btn-sm"
        >
          Logout
        </button>
      </div>
    </div>

    <h1 class="h2 mb-0">New Journal Entry</h1>
  </header>

  <form id="entryForm">

    <div class="mb-3">
      <label for="entry_date" class="form-label">Date</label>
      <input
        type="date"
        id="entry_date"
        class="form-control"
        required
      >
    </div>

    <div class="mb-3">
      <label for="activity" class="form-label">Activity</label>
      <input
        type="text"
        id="activity"
        class="form-control"
        placeholder="Cycling"
        required
      >
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="energy" class="form-label">Energy (1-5)</label>
        <input
          type="number"
          id="energy"
          class="form-control"
          min="1"
          max="5"
          required
        >
      </div>

      <div class="col-md-6 mb-3">
        <label for="engagement" class="form-label">Engagement (1-5)</label>
        <input
          type="number"
          id="engagement"
          class="form-control"
          min="1"
          max="5"
          required
        >
      </div>
    </div>

    <div class="mb-4">
      <label for="notes" class="form-label">Notes</label>
      <textarea
        id="notes"
        class="form-control"
        rows="4"
      ></textarea>
    </div>

    <button type="submit" class="btn btn-primary">
      Save Entry
    </button>

  </form>

</main>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
