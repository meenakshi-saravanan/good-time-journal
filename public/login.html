<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Chapters</title>
  <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg"
>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="auth">

<div class="container-fluid auth-layout px-0">
  <div class="row g-0">

    <!-- Left Panel -->
    <div class="col-lg-6 brand-panel">

      <div class="brand-content">

       <div class="mb-5">
  <img
    src="assets/images/Logo.png"
    alt="Chapters"
    class="brand-logo-image"
  >
</div>

        <h1 class="brand-headline">
          Every life is a story.
        </h1>

        <p class="brand-copy">
          Capture moments, revisit memories, and discover the
          chapters that shape your life.
        </p>

        <div class="brand-pillars">
          Capture &nbsp;♦&nbsp; Reflect &nbsp;♦&nbsp; Revisit
        </div>

      </div>

    </div>

    <!-- Right Panel -->
    <div class="col-lg-6 auth-panel">

      <div class="auth-container">

        <h1 class="auth-title display-6">
          Welcome back
        </h1>

        <p class="auth-subtitle">
          Pick up where your story left off.
        </p>

        <div id="authError"></div>

        <div class="security-message">
         <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3"/>
</svg>
          <span>
            Your journal is private and secure by default.
          </span>
        </div>

        <form id="loginForm">

          <div class="mb-3">
            <label
              for="email"
              class="form-label"
            >
              Email
            </label>

            <input
              type="email"
              id="email"
              class="form-control form-control-lg"
              placeholder="Enter email"
              required
            >
          </div>

          <div class="mb-4">
            <label
              for="password"
              class="form-label"
            >
              Password
            </label>

            <input
              type="password"
              id="password"
              class="form-control form-control-lg"
              placeholder="Enter password"
              required
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100"
          >
            Login
          </button>

        </form>

        <div class="my-4">

          <div class="d-flex align-items-center">

            <hr class="flex-grow-1">

            <span class="px-3 text-secondary">
              Or
            </span>

            <hr class="flex-grow-1">

          </div>

        </div>

        <button
          type="button"
          class="btn btn-light border w-100 google-btn"
        >
          <i class="bi bi-google me-2"></i>
          Continue with Google
        </button>

        <p class="text-center mt-4 mb-0">

          Don't have an account?

          <a href="/signup.html">
            Sign up
          </a>

        </p>

      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
