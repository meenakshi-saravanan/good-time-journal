<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapters Journal</title>
    <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

<main class="py-4 container " >

  <header
    class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3 mb-4"
  >
    <h1 class="mb-0">Good Time Journal</h1>

    <div
      class="d-flex align-items-center gap-3"
      aria-label="Account"
    >
      <span id="userName" class="text-secondary"></span>
      <button
        type="button"
        id="logoutButton"
        class="btn btn-outline-secondary btn-sm"
      >
        Logout
      </button>
    </div>
  </header>

  <div
    class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3 mb-4"
  >
    <h2 class="h4 mb-0">Recent Entries</h2>

    <button
      type="button"
      id="newEntryButton"
      class="btn btn-primary"
    >
      Add New Entry
    </button>
  </div>

  <div id="entries"></div>

</main>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>
<script src="js/api.js"></script>
<script src="js/journal.js"></script>
<script src="js/app.js"></script>

</body>
</html>
