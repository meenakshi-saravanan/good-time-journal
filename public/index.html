<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapters Journal</title>
    <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg">
  <link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

<header class="app-header">

  <div class="container-fluid px-4">

    <div class="d-flex align-items-center justify-content-between">

      <!-- Left -->
      <div class="d-flex align-items-center gap-3">

        <img
          src="../assets/images/Header-Logo.svg"
          alt="Chapters"
          class="header-logo"
        >

      </div>

      <!-- Right -->
      <div class="d-flex align-items-center gap-3">
 <button
        type="button"
        id="logoutButton"
        class="btn btn-sm"
      >
        Logout
      </button>
       
        <div class="user-avatar">
          MS
        </div>

      </div>

    </div>

  </div>

</header>



<main class="chapters-layout">

  <!-- Left Sidebar -->
  <aside class="sidebar">

   <div class="sidebar-top">

   <button
    id="allEntriesButton"
    class="sidebar-item active"
    data-journal-id="all">

    <i class="bi bi-journal-text"></i>

    <span>All Entries</span>

</button>
    <div class="sidebar-section-title">
        My Journals
    </div>

    <div id="journalList"></div>

</div>

    <div class="sidebar-bottom">

      <button class="sidebar-item">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </button>

      <button class="sidebar-item">
        <i class="bi bi-question-circle"></i>
        <span>Help</span>
      </button>

    </div>

  </aside>



  <!-- Journal List -->

<section class="journal-list-panel">

    <div class="entry-list-header">

        <div
            id="entryListTitle"
            class="entry-list-title"
        >
            ALL ENTRIES
        </div>

    </div>

    <div class="entry-search">

        <i class="bi bi-search"></i>

        <input
            id="entrySearch"
            type="text"
            placeholder="Search entries"
        >

    </div>

    <div
        id="entryList"
        class="entry-list"
    ></div>

</section>



  <!-- Preview Panel -->

  <section class="preview-panel">

    <div class="preview-placeholder">

      <i class="bi bi-journal-richtext display-3 text-secondary"></i>

      <h3 class="mt-4">
        Select a journal
      </h3>

      <p class="text-muted mb-0">
        Choose a journal from the list to begin reading or editing.
      </p>

    </div>

  </section>

</main>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>
<script src="js/api.js"></script>
<script src="js/journal.js"></script>
<script src="js/app.js"></script>

<div
  class="modal fade"
  id="createJournalModal"
  tabindex="-1"
  aria-hidden="true"
>

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Create Journal
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <form id="journalForm">

        <div class="modal-body">

          <div id="journalError"></div>

          <div class="mb-3">

            <label
              for="journalName"
              class="form-label"
            >
              Journal Name
            </label>

            <input
              type="text"
              id="journalName"
              class="form-control"
              placeholder="Personal Reflections"
              required
            >

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-outline-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>

          <button
            type="submit"
            class="btn btn-primary"
          >
            Create Journal
          </button>

        </div>

      </form>

    </div>

  </div>

</div>

</body>
</html>
