<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Chapters Journal</title>
<link href="../assets/images/Favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet"/>
<link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body class="app-page">
<header class="app-header">
<div class="container-fluid px-4">
<div class="d-flex align-items-center justify-content-between">
<!-- Left -->
<div class="d-flex align-items-center gap-3">
<img alt="Chapters" class="header-logo" src="../assets/images/Header-Logo.svg"/>
</div>
<!-- Right -->
<div class="d-flex align-items-center gap-3">
<button class="btn btn-sm" id="logoutButton" type="button">
        Logout
      </button>
<div class="user-avatar">
          MS
        </div>
</div>
</div>
</div>
</header>
<main class="chapters-layout">
<!-- Left Sidebar -->
<aside class="sidebar">
<div class="sidebar-top">
<button class="sidebar-item active" data-journal-id="all" id="allEntriesButton">
<i class="bi bi-journal-text"></i>
<span>All Entries</span>
</button>
<div class="sidebar-heading-row">

    <h6 class="sidebar-heading mb-0">
        My Journals
    </h6>

    <button
        id="createJournalButton"
        class="sidebar-add-button"
        type="button">

        <i class="bi bi-plus-lg"></i>

    </button>

</div>
<div id="journalList"></div>
</div>
<div class="sidebar-bottom">
<button class="sidebar-item">
<i class="bi bi-gear"></i>
<span>Settings</span>
</button>
<button class="sidebar-item">
<i class="bi bi-question-circle"></i>
<span>Help</span>
</button>
</div>
</aside>
<!-- Journal List -->
<section class="journal-list-panel">
<div class="entry-list-header">
<div class="panel-title" id="entryListTitle">
            ALL ENTRIES
        </div>
</div>
<div class="entry-search"> <input id="entrySearch" placeholder="Search entries" type="text"/></div>
<div class="entry-list" id="entryList"></div>
</section>
<!-- Preview Panel -->

<section class="preview-panel" id="entryPreview">
<div class="editor-header">

    <button
        class="editor-close-button"
        id="deleteEntryButton"
        type="button"
        title="Delete entry"
        aria-label="Delete entry">
        <i class="bi bi-x-lg"></i>
    </button>

    <div class="text-center">

        

        <div
            id="editorDate"
            class="editor-date">
        </div>

    </div>

    <button
        class="editor-new-button"
        id="editorNewButton"
        type="button">

        <i class="bi bi-plus-lg"></i>

    </button>

</div>
<div class="editor-toolbar-wrapper">
<div aria-label="Journal notes formatting" class="editor-toolbar gap-2 mb-2" role="toolbar">
<button class="editor-toolbar-button" id="undoButton" title="Undo" type="button">
<i class="bi bi-arrow-counterclockwise"></i>
</button>
<button class="editor-toolbar-button" id="redoButton" title="Redo" type="button">
<i class="bi bi-arrow-clockwise"></i>
</button>
<div class="editor-toolbar-divider"></div>
<div class="dropdown">
<button aria-expanded="false" class="editor-heading-dropdown" data-bs-toggle="dropdown" id="headingDropdown" type="button">
<span id="headingLabel">
      H2
    </span>
<i class="bi bi-chevron-down"></i>
</button>
<ul class="dropdown-menu editor-dropdown-menu">
<li>
<button class="dropdown-item" data-heading="paragraph" type="button">
        Paragraph
      </button>
</li>
<li>
<button class="dropdown-item" data-heading="1" type="button">
        H1
      </button>
</li>
<li>
<button class="dropdown-item" data-heading="2" type="button">
        H2
      </button>
</li>
<li>
<button class="dropdown-item" data-heading="3" type="button">
        H3
      </button>
</li>
<li>
<button class="dropdown-item" data-heading="4" type="button">
        H4
      </button>
</li>
</ul>
</div>
<div class="dropdown">
<button aria-expanded="false" class="editor-toolbar-pill" data-bs-toggle="dropdown" id="listDropdown" type="button">
<i class="bi bi-list-ul"></i>
<i class="bi bi-chevron-down"></i>
</button>
<ul class="dropdown-menu editor-dropdown-menu">
<li>
<button class="dropdown-item" data-list="bullet" type="button">
<i class="bi bi-list-ul me-2"></i>
        Bullet List
      </button>
</li>
<li>
<button class="dropdown-item" data-list="ordered" type="button">
<i class="bi bi-list-ol me-2"></i>
        Ordered List
      </button>
</li>
</ul>
</div>
<div class="editor-toolbar-divider"></div>
<div class="editor-toolbar-group btn-group-sm" role="group">
<button class="editor-icon-button" id="boldButton" type="button">
<i class="bi bi-type-bold"></i>
</button>
<button class="editor-icon-button" id="italicButton" type="button">
<i class="bi bi-type-italic"></i>
</button>
<button class="editor-icon-button" id="strikeButton" type="button">
<i class="bi bi-type-strikethrough"></i>
</button>
<button class="editor-icon-button" id="underlineButton" type="button">
<i class="bi bi-type-underline"></i>
</button>
<button class="editor-icon-button" id="highlightButton" type="button">
<i class="bi bi-highlighter"></i>
</button>
<button class="editor-icon-button" id="linkButton" type="button">
<i class="bi bi-link-45deg"></i>
</button>
<div class="editor-toolbar-divider"></div>
<button class="editor-icon-button" id="alignLeftButton" type="button">
<i class="bi bi-text-left"></i>
</button>
<button class="editor-icon-button" id="alignCenterButton" type="button">
<i class="bi bi-text-center"></i>
</button>
<button class="editor-icon-button" id="alignRightButton" type="button">
<i class="bi bi-text-right"></i>
</button>
<button class="editor-icon-button" id="alignJustifyButton" type="button">
<i class="bi bi-justify"></i>
</button>
</div>

</div>
</div>
<div class="editor-link-popover d-none" id="linkPopover">
<input class="editor-link-input" id="linkInput" placeholder="Paste a link..." type="text"/>
<div class="editor-link-actions">
<button id="applyLinkButton" type="button">
<i class="bi bi-arrow-return-left"></i>
</button>
<button id="openLinkButton" type="button">
<i class="bi bi-box-arrow-up-right"></i>
</button>
<button id="removeLinkButton" type="button">
<i class="bi bi-trash"></i>
</button>
</div>
</div>
<div class="editor-body">
<div class="tiptap-editor" id="editor"></div>
<input id="notes" type="hidden"/>
</div>
</section>
</main>
<script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/editor.js" type="module"></script>
<script src="js/journal.js"></script>
<script src="js/app.js"></script>
<div aria-hidden="true" class="modal fade" id="createJournalModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">
          Create Journal
        </h5>
<button class="btn-close" data-bs-dismiss="modal" type="button"></button>
</div>
<form id="journalForm">
<div class="modal-body">
<div id="journalError"></div>
<div class="mb-3">
<label class="form-label" for="journalName">
              Journal Name
            </label>
<input class="form-control" id="journalName" placeholder="Personal Reflections" required="" type="text"/>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">
            Cancel
          </button>
<button class="btn btn-primary" type="submit">
            Create Journal
          </button>
</div>
</form>
</div>
</div>
</div>
<div aria-hidden="true" class="modal fade" id="deleteEntryModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">
          Delete Entry
        </h5>
<button class="btn-close" data-bs-dismiss="modal" type="button"></button>
</div>
<div class="modal-body">
<div id="deleteEntryError"></div>
<p class="mb-0">
            Are you sure you want to delete this journal entry? This action cannot be undone.
          </p>
</div>
<div class="modal-footer">
<button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">
            Cancel
          </button>
<button class="btn btn-danger" id="confirmDeleteEntryButton" type="button">
            Delete Entry
          </button>
</div>
</div>
</div>
</div>
</body>
</html>
