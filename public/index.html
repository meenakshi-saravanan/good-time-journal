<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapters Journal</title>
    <link
  rel="icon"
  type="image/svg+xml"
  href="../assets/images/Favicon.svg">
  <link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">

<header class="app-header">

  <div class="container-fluid px-4">

    <div class="d-flex align-items-center justify-content-between">

      <!-- Left -->
      <div class="d-flex align-items-center gap-3">

        <img
          src="../assets/images/Header-Logo.svg"
          alt="Chapters"
          class="header-logo"
        >

      </div>

      <!-- Right -->
      <div class="d-flex align-items-center gap-3">
 <button
        type="button"
        id="logoutButton"
        class="btn btn-sm"
      >
        Logout
      </button>
       
        <div class="user-avatar">
          MS
        </div>

      </div>

    </div>

  </div>

</header>



  <main class="py-4 container" >


  <div
    class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3 mb-4"
  >
    <h2 class="h4 mb-0">My Journals</h2>

  <div class="d-flex align-items-center gap-3">

  <a
    href="/templates"
    class="
    link-offset-2
    link-underline
    link-underline-opacity-0
    "
  >
    Browse Templates
  </a>

<button
  type="button"
  class="btn btn-primary btn-sm"
  data-bs-toggle="modal"
  data-bs-target="#createJournalModal"
>
  New Journal
</button>

</div>
  </div>

  <div id="journals"></div>

  <div class="mt-4">
  
  </div>

</main>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"
></script>
<script src="js/api.js"></script>
<script src="js/journal.js"></script>
<script src="js/app.js"></script>

<div
  class="modal fade"
  id="createJournalModal"
  tabindex="-1"
  aria-hidden="true"
>

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          Create Journal
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <form id="journalForm">

        <div class="modal-body">

          <div id="journalError"></div>

          <div class="mb-3">

            <label
              for="journalName"
              class="form-label"
            >
              Journal Name
            </label>

            <input
              type="text"
              id="journalName"
              class="form-control"
              placeholder="Personal Reflections"
              required
            >

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-outline-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>

          <button
            type="submit"
            class="btn btn-primary"
          >
            Create Journal
          </button>

        </div>

      </form>

    </div>

  </div>

</div>

</body>
</html>
